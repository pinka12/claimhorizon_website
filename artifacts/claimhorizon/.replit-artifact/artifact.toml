kind = "web"
previewPath = "/"
title = "ClaimHorizon"
version = "1.0.0"
id = "artifacts/claimhorizon"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25742

[services.development]
run = "pnpm --filter @workspace/claimhorizon run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/claimhorizon", "run", "build" ]
publicDir = "artifacts/claimhorizon/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25742"
BASE_PATH = "/"
